        let emocionActualKey = null;
        let indiceActual = 0;

        async function traducirTexto(texto, origen, destino) {
            if (origen === destino) return texto;
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${origen}&tl=${destino}&dt=t&q=${encodeURIComponent(texto)}`;
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (error) { return texto; }
        }

        function cambiarIdioma(nuevoIdioma) {
            idiomaDestino = nuevoIdioma;
            const textos = INTERFAZ_TRADUCCIONES[nuevoIdioma];
            document.getElementById('main-title').innerText = textos.tituloApp;
            document.getElementById('main-subtitle').innerText = textos.subtituloApp;
            document.getElementById('label-miedo-tag').innerHTML = `<span>🌀</span> ${textos.miedoTag.split(' ')[1]}`;
            document.getElementById('label-miedo-title').innerText = textos.miedoTitle;
            document.getElementById('label-miedo-desc').innerText = textos.miedoDesc;
            document.getElementById('label-tristeza-tag').innerHTML = `<span>😢</span> ${textos.tristezaTag.split(' ')[1]}`;
            document.getElementById('label-tristeza-title').innerText = textos.tristezaTitle;
            document.getElementById('label-tristeza-desc').innerText = textos.tristezaDesc;
            document.getElementById('label-ira-tag').innerHTML = `<span>🤬</span> ${textos.iraTag.split(' ')[1]}`;
            document.getElementById('label-ira-title').innerText = textos.iraTitle;
            document.getElementById('label-ira-desc').innerText = textos.iraDesc;
            document.getElementById('label-culpa-tag').innerHTML = `<span>🫣</span> ${textos.culpaTag.split(' ')[1]}`;
            document.getElementById('label-culpa-title').innerText = textos.culpaTitle;
            document.getElementById('label-culpa-desc').innerText = textos.culpaDesc;
            if (!emocionActualKey) {
                document.getElementById('placeholder-text').innerText = textos.placeholder;
                document.getElementById('placeholder-sub').innerText = textos.placeholderSub;
            } else {
                const emocion = EMOCIONES_DB[emocionActualKey];
                renderizarRecetaConTraduccion(emocion, emocion.items[indiceActual]);
            }
        }

        async function recetar(emocionKey) {
            if (!esPremium && contadorConsultas >= LIMITE_CONSULTAS_GRATIS) {
                mostrarPaywall();
                return;
            }
            if (!esPremium) {
                contadorConsultas++;
                localStorage.setItem('contador_consultas', contadorConsultas.toString());
            }
            emocionActualKey = emocionKey;
            const emocion = EMOCIONES_DB[emocionKey];
            indiceActual = Math.floor(Math.random() * emocion.items.length);
            const item = emocion.items[indiceActual];
            document.querySelectorAll('.emocion-btn').forEach(btn => btn.className = "emocion-btn p-5 rounded-2xl border border-slate-800 bg-slate-900 hover:border-slate-700 hover:bg-slate-850 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg text-slate-200");
            document.getElementById(`btn-${emocionKey}`).className = `emocion-btn p-5 rounded-2xl border border-transparent ${emocion.colorGradiente} text-white scale-102 ring-4 ring-emerald-500/20 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg`;
            const textos = INTERFAZ_TRADUCCIONES[idiomaDestino];
            document.getElementById('pantalla-receta').innerHTML = `<div class="border border-dashed border-emerald-500/30 rounded-3xl p-8 text-center text-slate-300 flex flex-col items-center justify-center h-64 bg-slate-900/40"><div class="w-10 h-10 border-4 border-emerald-400 border-t-transparent rounded-full animate-spin mb-4"></div><p class="text-sm font-semibold">${textos.cargando}</p></div>`;
            await renderizarRecetaConTraduccion(emocion, item);
        }

        async function rotarReceta() {
            if (!esPremium && contadorConsultas >= LIMITE_CONSULTAS_GRATIS) {
                mostrarPaywall();
                return;
            }
            if (!esPremium) {
                contadorConsultas++;
                localStorage.setItem('contador_consultas', contadorConsultas.toString());
            }
            if (!emocionActualKey) return;
            const emocion = EMOCIONES_DB[emocionActualKey];
            indiceActual = Math.floor(Math.random() * emocion.items.length);
            await renderizarRecetaConTraduccion(emocion, emocion.items[indiceActual]);
        }

        async function renderizarRecetaConTraduccion(emocion, item) {
            const textos = INTERFAZ_TRADUCCIONES[idiomaDestino];
            const versoTraducido = await traducirTexto(item.verso, 'es', idiomaDestino);
            const comentarioTraducido = await traducirTexto(item.comentario, 'es', idiomaDestino);
            const tituloEmocionTraducido = textos[`${emocionActualKey}Title`] || emocion.titulo;
            document.getElementById('pantalla-receta').innerHTML = `<div id="tarjeta-contenido" class="w-full p-6 sm:p-8 rounded-3xl border transition-all duration-300 ${emocion.colorBg} ${emocion.colorBorde} shadow-2xl"><div class="flex justify-between items-center mb-6"><span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-white shadow-sm ${emocion.colorTexto}">${textos.medicinaPara}: ${tituloEmocionTraducido}</span><button onclick="rotarReceta()" class="p-2.5 rounded-xl bg-white hover:bg-slate-100 transition-colors shadow-sm ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 0 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></button></div><div class="mb-6 relative pl-4 border-l-4 border-slate-300"><p class="text-xl sm:text-2xl font-serif italic text-slate-800 leading-relaxed">"${versoTraducido}"</p><p class="text-right font-bold mt-3 text-xs sm:text-sm flex items-center justify-end gap-1.5 ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 48.507 0 0 1 11.186 0Z" /></svg>${item.cita}</p></div><hr class="border-slate-300/60 my-4" /><div class="flex gap-3 items-start bg-white/75 p-4 rounded-2xl border border-white/40 shadow-sm"><div class="mt-0.5 flex-shrink-0 ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg></div><div><span class="text-xs font-bold text-slate-500 uppercase tracking-wider block mb-0.5">${textos.cableTierra}</span><p class="text-slate-700 text-sm sm:text-base leading-relaxed font-semibold">${comentarioTraducido}</p></div></div></div>`;
        }

         function mostrarPaywall() {
            const textos = INTERFAZ_TRADUCCIONES[idiomaDestino];
            document.getElementById('pantalla-receta').innerHTML = `<div class="w-full p-8 rounded-3xl border border-emerald-500/30 bg-gradient-to-b from-slate-900 to-slate-950 text-center shadow-2xl flex flex-col items-center justify-center min-h-[300px]"><span class="text-5xl mb-4">🌟</span><h3 class="text-2xl font-bold text-white mb-2">${textos.paywallTitulo}</h3><p class="text-slate-400 text-sm max-w-sm mx-auto mb-6 leading-relaxed">${textos.paywallDesc}</p><a href="${ENLACE_STRIPE}" class="w-full max-w-xs py-4 px-6 rounded-2xl bg-gradient-to-r from-teal-400 to-emerald-500 text-slate-950 font-bold hover:brightness-110 active:scale-95 transition-all text-center shadow-lg block">${textos.paywallBoton}</a><p class="text-[10px] text-slate-600 mt-4">${textos.paywallSub}</p></div>`;
        }

        const audio = document.getElementById('audio-fondo');
        const btnMusica = document.getElementById('btn-musica');
        const iconoPlay = document.getElementById('icono-play');
        const iconoPause = document.getElementById('icono-pause');
        btnMusica.addEventListener('click', () => {
            if (audio.paused) { audio.play(); iconoPlay.classList.add('hidden'); iconoPause.classList.remove('hidden'); }
            else { audio.pause(); iconoPlay.classList.remove('hidden'); iconoPause.classList.add('hidden'); }
        });
    </script>
</body>
</html>
