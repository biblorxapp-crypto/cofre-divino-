<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Botiquín Emocional – Pronto abriremos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Plus Jakarta Sans", sans-serif;
      background-color: #FDFBF7; /* blanco marfil paleta 2 */
      color: #1A1A1A;           /* gris grafito paleta 2 */
    }
  </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-[#FDFBF7]">

  <div class="max-w-md mx-auto text-center px-6 py-10 rounded-3xl border border-[#E6E6E6] bg-white/70 backdrop-blur">
    <p class="text-xs tracking-[0.25em] uppercase text-[#BEB7B0] mb-3">
      Botiquín Emocional
    </p>

    <h1 class="text-3xl font-semibold text-[#1A1A1A] mb-4">
      Estamos preparando algo para tu alma.
    </h1>

    <p class="text-sm text-[#A38F7B] mb-6 leading-relaxed">
      Esta página está en construcción.  
      Muy pronto podrás acceder a tu Botiquín Emocional:
      primeros auxilios espirituales para cuando todo parece salirse de control.
    </p>

    <div class="inline-flex items-center gap-2 px-4 py-2 rounded-full bg-[#EDE7DF] text-xs text-[#1A1A1A]">
      <span class="w-2 h-2 rounded-full bg-[#A38F7B] animate-pulse"></span>
      <span>En proceso de apertura</span>
    </div>

    <p class="mt-6 text-[11px] text-[#BEB7B0]">
      Vuelve pronto.  
      Cada cosa se abre en su tiempo perfecto.
    </p>
  </div>

</body>
</html>
