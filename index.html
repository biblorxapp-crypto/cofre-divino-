<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🩺 Botiquín Emocional</title>
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#0E0E0E">
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFCF7;--bg-card:#FFFCF7;--bg-card-soft:#F3E9DD;--border:#D8CFC3;--text:#5A544C;--text-soft:rgba(90,84,76,0.6);--text-strong:#0E0E0E;--accent:#4A7F6A}
[data-theme="dark"]{--bg:#0E0E0E;--bg-card:#161413;--bg-card-soft:#1C1A18;--border:rgba(90,84,76,0.3);--text:#F3E9DD;--text-soft:rgba(216,207,195,0.6);--text-strong:#FFFCF7;--accent:#D4B46A}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg)!important;color:var(--text)!important;transition:.3s}
.font-serif{font-family:'Playfair Display',serif}
.carousel{display:flex;gap:14px;overflow-x:auto;padding:10px 20px 18px;scroll-snap-type:x mandatory}
.carousel::-webkit-scrollbar{display:none}
.carousel-item{scroll-snap-align:center;flex:0 0 76%;max-width:300px;min-width:168px}
@media(min-width:400px){.carousel-item{flex:0 0 46%}}
.dot{width:6px;height:6px;border-radius:20px;background:var(--border);transition:.3s}
.dot.active{width:22px;background:var(--accent)}
</style>
</head>
<body class="min-h-screen flex flex-col justify-between">
<div class="fixed top-4 left-4 right-4 z-50 flex justify-between items-center pointer-events-none">
<div class="pointer-events-auto bg-[#FFFCF7]/90 backdrop-blur border border-[#D8CFC3] p-2 rounded-2xl shadow-xl flex items-center gap-2">🌐 <select id="selector-idioma" onchange="cambiarIdioma(this.value)" class="bg-transparent text-xs font-bold"><option value="es">Español</option><option value="en">English</option></select></div>
<div class="pointer-events-auto flex items-center gap-2"><button id="btn-theme" onclick="toggleTheme()" class="bg-[#FFFCF7]/90 backdrop-blur border border-[#D8CFC3] p-2.5 rounded-2xl shadow-xl w-10 h-10">🌙</button><div class="bg-[#FFFCF7]/90 backdrop-blur border border-[#D8CFC3] p-2.5 rounded-2xl shadow-xl flex items-center gap-3"><span id="contador-restante" class="text-[10px] font-bold"></span><button id="btn-musica" class="w-8 h-8 rounded-full bg-[#4A7F6A] text-white">▶</button><audio id="audio-fondo" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio></div></div>
</div>
<main class="flex-grow flex flex-col items-center p-4 max-w-2xl mx-auto w-full mt-20">
<h1 id="main-title" class="text-4xl font-extrabold mb-2" style="color:var(--accent)">🩺 Botiquín Emocional</h1>
<p id="main-subtitle" class="text-sm opacity-60 mb-6">Primeros auxilios espirituales</p>
<div id="emociones-carousel" class="carousel w-full">
<button onclick="recetar('miedo')" id="btn-miedo" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🌀 ANSIEDAD<br><b>Miedo / Ansiedad</b></button>
<button onclick="recetar('tristeza')" id="btn-tristeza" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">😢 TRISTEZA<br><b>Tristeza</b></button>
<button onclick="recetar('ira')" id="btn-ira" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🤬 IRA<br><b>Ira</b></button>
<button onclick="recetar('culpa')" id="btn-culpa" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🫣 CULPA<br><b>Culpa</b></button>
<button onclick="recetar('soledad')" id="btn-soledad" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🌙 SOLEDAD<br><b>Soledad</b></button>
<button onclick="recetar('agotamiento')" id="btn-agotamiento" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🪫 CANSANCIO<br><b>Agotamiento</b></button>
<button onclick="recetar('confusion')" id="btn-confusion" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🌫️ CONFUSIÓN<br><b>Confusión</b></button>
<button onclick="recetar('desanimo')" id="btn-desanimo" class="carousel-item p-5 rounded-2xl border bg-[#FFFCF7] text-left h-40">🍂 DESÁNIMO<br><b>Desánimo</b></button>
</div>
<div id="carousel-dots" class="flex gap-1.5 my-4"></div>
<div id="pantalla-receta" class="w-full min-h-[300px]"><div class="border border-dashed rounded-3xl p-8 text-center h-[300px] flex flex-col items-center justify-center"><span class="text-4xl mb-3">👇</span><p id="placeholder-text">¿Cómo te sientes en este momento?</p><p id="placeholder-sub" class="text-xs opacity-60">Desliza y presiona una emoción</p></div></div>
</main>
<script>
const htmlEl=document.documentElement;const saved=localStorage.getItem('botiquin_theme')||'light';htmlEl.setAttribute('data-theme',saved);document.getElementById('btn-theme').innerText=saved==='dark'?'☀️':'🌙';
function toggleTheme(){const cur=htmlEl.getAttribute('data-theme');const nxt=cur==='dark'?'light':'dark';htmlEl.setAttribute('data-theme',nxt);localStorage.setItem('botiquin_theme',nxt);document.getElementById('btn-theme').innerText=nxt==='dark'?'☀️':'🌙';}
let cont=parseInt(localStorage.getItem('contador_consultas')||'0');function upd(){const el=document.getElementById('contador-restante');el.innerText=cont+' GRATIS';}upd();
const DB={miedo:[{v:"No se preocupen por nada; oren por todo.",c:"Filipenses 4:6",com:"Deja el micrófono y respira."}],tristeza:[{v:"Cercano está el Señor a los quebrantados.",c:"Salmo 34:18",com:"Dios se sienta contigo."}],ira:[{v:"Si se enojan, no pequen.",c:"Efesios 4:26",com:"No envíes ese mensaje."}],culpa:[{v:"Ninguna condenación hay en Cristo.",c:"Romanos 8:1",com:"Caso cerrado."}],soledad:[{v:"Yo estoy con vosotros todos los días.",c:"Mateo 28:20",com:"Todos los días."}],agotamiento:[{v:"Vengan a mí los cansados.",c:"Mateo 11:28",com:"Él no cobra por hora."}],confusion:[{v:"Pide sabiduría a Dios.",c:"Santiago 1:5",com:"Ora 5 min."}],desanimo:[{v:"Esforzaos y cobrad ánimo.",c:"Deuteronomio 31:6",com:"Vas con Uno que no falla."}]};
let actual=null,idx=0;
function recetar(k){actual=k;idx=Math.floor(Math.random()*DB[k].length);const it=DB[k][idx];document.getElementById('pantalla-receta').innerHTML=`<div class="p-6 rounded-3xl border bg-[var(--bg-card)]"><p class="font-serif italic text-xl">"${it.v}"</p><p class="text-right text-xs font-bold mt-2">${it.c}</p><div class="bg-[var(--bg-card-soft)] p-4 rounded-xl mt-4"><p class="text-sm font-semibold">${it.com}</p></div><button onclick="recetar('${k}')" class="mt-4 w-full py-3 rounded-xl bg-[var(--accent)] text-white font-bold">Otra 🔄</button></div>`;document.getElementById('btn-'+k).scrollIntoView({behavior:'smooth',inline:'center'});}
function cambiarIdioma(){}
document.getElementById('btn-musica').onclick=()=>{const a=document.getElementById('audio-fondo');a.paused?a.play():a.pause();}
</script>
</body>
</html>
