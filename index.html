            const current = htmlEl.getAttribute('data-theme');

        async function traducirTexto(texto, origen, destino) {
            if (origen === destino) return texto;
            try {
                const url = `https://translate.googleapis.com/translate_a/single?client=gtx&sl=${origen}&tl=${destino}&dt=t&q=${encodeURIComponent(texto)}`;
                const response = await fetch(url);
                const data = await response.json();
                return data[0].map(item => item[0]).join('');
            } catch (error) { return texto; }
        }

            document.getElementById('pantalla-receta').innerHTML = `<div id="tarjeta-contenido" class="w-full p-6 sm:p-8 rounded-3xl border transition-all duration-500 ${emocion.colorBg} ${emocion.colorBorde} sin-shadow bg-[var(--bg-card)]"><div class="flex justify-between items-center mb-6"><span class="px-4 py-1.5 rounded-full text-xs font-bold uppercase tracking-wider bg-[var(--bg)] shadow-sm ${emocion.colorTexto}">${textos.medicinaPara}: ${tituloEmocionTraducido}</span><button onclick="rotarReceta()" class="p-2.5 rounded-xl bg-[var(--bg)] hover:bg-[var(--bg-card-soft)] transition-colors shadow-sm ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M16.023 9.348h4.992v-.001M2.985 19.644v-4.992m0 0h4.992m-4.993 0 3.181 3.183a8.25 8.25 0 13.803-3.7M4.031 9.865a8.25 8.25 0 0 1 13.803-3.7l3.181 3.182m0-4.991v4.99" /></svg></button></div><div class="mb-6 relative pl-4 border-l-4 border-[var(--border)]"><p class="text-xl sm:text-2xl font-serif italic text-[var(--text-strong)] leading-relaxed">"${versoTraducido}"</p><p class="text-right font-bold mt-3 text-xs sm:text-sm flex items-center justify-end gap-1.5 ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4 h-4"><path stroke-linecap="round" stroke-linejoin="round" d="M17.593 3.322c1.128 1.907 1.077 1.907 2.185V21L12 17.25 4.5 21V5.507c0-1.108.806-2.057 1.907-2.185a48.507 0 11.186 0Z" /></svg>${item.cita}</p></div><hr class="border-[var(--border)]/60 my-4" /><div class="flex gap-3 items-start bg-[var(--bg)]/60 p-4 rounded-2xl border-[var(--border)]"><div class="mt-0.5 flex-shrink-0 ${emocion.colorTexto}"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 24 24" stroke-width="2" stroke="currentColor" class="w-5 h-5"><path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" /></svg></div><div><span class="text-xs font-bold text-[var(--text-soft)] uppercase tracking-wider block mb-0.5">${textos.cableTierra}</span><p class="text-[var(--text)] text-sm sm:text-base leading-relaxed font-semibold">${comentarioTraducido}</p></div></div></div>`;
        }

         function mostrarPaywall() {
            const textos = INTERFAZ_TRADUCCIONES[idiomaDestino];
            document.getElementById('pantalla-receta').innerHTML = `<div class="w-full p-8 rounded-3xl border-[var(--accent)]/20 bg-gradient-to-b from-[var(--bg-card-soft)] to-[var(--bg)] text-center flex flex-col items-center justify-center min-h-[380px] sin-shadow"><span class="text-5xl mb-4">🌟</span><h3 class="text-2xl font-bold text-[var(--text-strong)] mb-2">${textos.paywallTitulo}</h3><p class="text-[var(--text-soft)] text-sm max-w-sm mx-auto mb-6 leading-relaxed">${textos.paywallDesc}</p><a href="${ENLACE_STRIPE}" class="w-full max-w-xs py-4 px-6 rounded-2xl bg-gradient-to-r from-[var(--accent)] to-[var(--accent-2)] text-[var(--bg)] font-bold hover:brightness-110 active:scale-95 transition-all text-center shadow-lg block">${textos.paywallBoton}</a><p class="text- text-[var(--text-soft)] mt-4">${textos.paywallSub}</p><button onclick="localStorage.setItem('contador_consultas','0');location.reload();" class="mt-6 text-xs text-[var(--text-soft)] underline">Reiniciar contador (solo para pruebas)</button></div>`;
        }

        const audio = document.getElementById('audio-fondo');
        const btnMusica = document.getElementById('btn-musica');
        const iconoPlay = document.getElementById('icono-play');
        const iconoPause = document.getElementById('icono-pause');
        btnMusica.addEventListener('click', () => {
            if (audio.paused) { audio.play(); iconoPlay.classList.add('hidden'); iconoPause.classList.remove('hidden'); }
            else { audio.pause(); iconoPlay.classList.remove('hidden'); iconoPause.classList.add('hidden'); }
        });

        // INICIO: Mostrar bienvenida con ilustración al cargar
        mostrarBienvenida();
    </script>

          navigator.serviceWorker.register('/sw.js').then(reg => {

          }).catch(err => console.log('SW error', err));
        });
      }
