<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>🩺 Botiquín Emocional</title>

<meta name="theme-color" content="#10b981">

<link rel="manifest" href="manifest.json">

<script src="https://cdn.tailwindcss.com"></script>

<style>

body{
    font-family: Arial, sans-serif;
}

.card{
    transition:.3s;
}

.card:hover{
    transform:translateY(-4px);
}

.fade{
    animation:fade .4s ease;
}

@keyframes fade{
    from{
        opacity:0;
        transform:translateY(15px);
    }
    to{
        opacity:1;
        transform:translateY(0);
    }
}

</style>

</head>


<body class="bg-slate-950 text-white min-h-screen">


<header class="p-5 text-center">

<h1 class="text-4xl font-bold text-emerald-400">
🩺 Botiquín Emocional
</h1>

<p class="text-slate-400 mt-3">
Primeros auxilios para el alma en momentos difíciles.
</p>

</header>



<main class="max-w-xl mx-auto p-5">


<section>

<h2 class="text-xl font-bold mb-4">
¿Cómo te sientes hoy?
</h2>


<div class="grid grid-cols-2 gap-4">


<button onclick="mostrarEmocion('ansiedad')"
class="card bg-slate-900 border border-slate-800 rounded-2xl p-5">

<div class="text-3xl">
🌀
</div>

<h3 class="font-bold mt-2">
Ansiedad
</h3>

<p class="text-xs text-slate-400">
Mi mente no se detiene
</p>

</button>



<button onclick="mostrarEmocion('tristeza')"
class="card bg-slate-900 border border-slate-800 rounded-2xl p-5">

<div class="text-3xl">
😢
</div>

<h3 class="font-bold mt-2">
Tristeza
</h3>

<p class="text-xs text-slate-400">
Necesito consuelo
</p>

</button>



<button onclick="mostrarEmocion('enojo')"
class="card bg-slate-900 border border-slate-800 rounded-2xl p-5">

<div class="text-3xl">
🔥
</div>

<h3 class="font-bold mt-2">
Enojo
</h3>

<p class="text-xs text-slate-400">
No controlo mi reacción
</p>

</button>



<button onclick="mostrarEmocion('soledad')"
class="card bg-slate-900 border border-slate-800 rounded-2xl p-5">

<div class="text-3xl">
🌙
</div>

<h3 class="font-bold mt-2">
Soledad
</h3>

<p class="text-xs text-slate-400">
Necesito compañía
</p>

</button>


</div>

</section>



<section id="resultado"
class="mt-8 hidden">

<div class="fade bg-white text-slate-900 rounded-3xl p-6 shadow-xl">


<h2 id="titulo"
class="text-2xl font-bold text-emerald-700">
</h2>


<p id="mensaje"
class="mt-4 text-lg leading-relaxed">
</p>


<div class="mt-5 p-4 bg-emerald-50 rounded-xl">

<p class="font-bold">
🌱 Pequeña acción:
</p>

<p id="accion">
</p>

</div>


<button onclick="nuevaReceta()"
class="mt-6 w-full bg-emerald-500 text-black font-bold py-3 rounded-xl">

Otra reflexión

</button>


</div>

</section>


</main>



<footer class="text-center text-xs text-slate-600 p-8">

Creado para acompañar momentos difíciles ❤️

</footer>

<script>


const recetas = {

ansiedad: [

{
titulo:"Cuando tu mente corre demasiado 🌀",
mensaje:"No todo pensamiento merece una respuesta. A veces la mente crea tormentas donde solo existe una nube. Hoy no tienes que resolver toda tu vida, solo este momento.",
accion:"Respira profundo 5 veces y pregúntate: ¿Qué puedo controlar ahora?"
},

{
titulo:"El silencio también es medicina",
mensaje:"Tu valor no depende de tener todo bajo control. Hay batallas que se ganan descansando y confiando.",
accion:"Apaga las notificaciones durante 10 minutos y regálate tranquilidad."
}

],


tristeza:[

{
titulo:"Tus lágrimas también hablan ❤️",
mensaje:"La tristeza no significa debilidad. A veces el corazón necesita detenerse para sanar.",
accion:"Escribe una cosa por la que todavía puedes agradecer hoy."
},

{
titulo:"Después de la noche llega la mañana",
mensaje:"Los momentos difíciles no escriben toda tu historia. Son solamente una página.",
accion:"Busca una pequeña cosa que te dé esperanza hoy."
}

],


enojo:[

{
titulo:"No entregues tu paz al enojo 🔥",
mensaje:"Una reacción de segundos puede crear heridas que tardan años en sanar. Tu fuerza está en elegir cómo responder.",
accion:"Antes de responder, espera 10 segundos y respira."
},

{
titulo:"La calma es poder",
mensaje:"Controlar tus emociones no significa ignorarlas; significa que ellas no controlan tu destino.",
accion:"Aléjate unos minutos antes de tomar una decisión."
}

],


soledad:[

{
titulo:"Nunca estás completamente solo 🌙",
mensaje:"Hay temporadas donde el silencio pesa, pero incluso esos momentos pueden convertirse en espacios para encontrarte contigo mismo.",
accion:"Envía un mensaje a alguien que aprecias o busca una conversación sincera."
}

]

};



let emocionActual = "";



function mostrarEmocion(tipo){


emocionActual = tipo;


const lista = recetas[tipo];


const receta = lista[
Math.floor(Math.random()*lista.length)
];


document.getElementById("resultado")
.classList.remove("hidden");


document.getElementById("titulo")
.innerHTML = receta.titulo;


document.getElementById("mensaje")
.innerHTML = receta.mensaje;


document.getElementById("accion")
.innerHTML = receta.accion;


window.scrollTo({

top:document.body.scrollHeight,

behavior:"smooth"

});


}



function nuevaReceta(){

if(emocionActual){

mostrarEmocion(emocionActual);

}

}



</script>


<!-- SISTEMA PREMIUM Y CONFIGURACIÓN -->

<script>


const LIMITE_GRATIS = 10;

let consultas = 
localStorage.getItem("consultas_botiquin") || 0;


let premium =
localStorage.getItem("botiquin_premium") === "true";



function verificarAcceso(){


if(premium){

return true;

}


if(consultas >= LIMITE_GRATIS){


mostrarPremium();

return false;


}


consultas++;


localStorage.setItem(
"consultas_botiquin",
consultas
);


return true;

}




function mostrarPremium(){


document.getElementById("resultado")
.classList.remove("hidden");


document.getElementById("titulo")
.innerHTML =
"🌟 Desbloquea tu Botiquín Premium";


document.getElementById("mensaje")
.innerHTML =
"Has utilizado tus reflexiones gratuitas. Desbloquea acceso ilimitado para continuar recibiendo acompañamiento diario.";


document.getElementById("accion")
.innerHTML =

`
<a href="#" 
onclick="activarPremium()"
class="block text-center bg-emerald-500 text-black font-bold p-3 rounded-xl">

Desbloquear Premium

</a>
`;

}




function activarPremium(){


/*
Aquí después conectaremos Stripe.
Por ahora activa modo prueba.
*/


localStorage.setItem(
"botiquin_premium",
"true"
);


premium=true;


alert(
"Premium activado"
);


}




// MODIFICAMOS LA FUNCIÓN PRINCIPAL

const funcionOriginal = mostrarEmocion;


mostrarEmocion = function(tipo){


if(!verificarAcceso()){

return;

}


funcionOriginal(tipo);


}





</script>



<!-- SELECTOR DE IDIOMA -->

<div class="fixed top-4 right-4">

<select
class="bg-slate-900 border border-slate-700 rounded-xl p-2 text-sm"
onchange="cambiarIdioma(this.value)">

<option value="es">
🇪🇸 Español
</option>

<option value="en">
🇺🇸 English
</option>

</select>

</div>




<script>


function cambiarIdioma(idioma){


if(idioma==="en"){


document.querySelector("h1").innerHTML =
"🩺 Emotional First Aid";


document.querySelector("header p").innerHTML =
"Emotional support for difficult moments.";


}

else{


document.querySelector("h1").innerHTML =
"🩺 Botiquín Emocional";


document.querySelector("header p").innerHTML =
"Primeros auxilios para el alma en momentos difíciles.";

}


}


</script>


<script>


// REGISTRO DEL SERVICE WORKER

if("serviceWorker" in navigator){


window.addEventListener(
"load",
()=>{


navigator.serviceWorker
.register("/sw.js")
.then(()=>{

console.log(
"Botiquín Emocional funcionando offline"
);

})

.catch(error=>{

console.log(
"Error Service Worker:",
error
);

});


}

);


}




</script>


</body>

</html>
