<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🩺 Botiquín Emocional / Emotional First Aid</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=300;400;600;700&family=Playfair+Display:ital,wght=0,600;1,400&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', Georgia, serif; }
    </style>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen flex flex-col justify-between">

    <!-- CABECERA DE CONFIGURACIÓN -->
    <div class="fixed top-4 left-4 right-4 z-50 flex justify-between items-center pointer-events-none">
        <div class="pointer-events-auto bg-slate-900/90 backdrop-blur border border-slate-800 p-2 rounded-2xl shadow-xl flex items-center gap-2">
            <span class="text-sm pl-1">🌐</span>
            <select id="selector-idioma" onchange="cambiarIdioma(this.value)" class="bg-transparent text-xs text-slate-200 font-bold focus:outline-none pr-2 cursor-pointer">
                <option value="es" class="bg-slate-900 text-slate-200">Español</option>
                <option value="en" class="bg-slate-900 text-slate-200">English</option>
                <option value="pt" class="bg-slate-900 text-slate-200">Português</option>
                <option value="fr" class="bg-slate-900 text-slate-200">Français</option>
                <option value="it" class="bg-slate-900 text-slate-200">Italiano</option>
            </select>
        </div>
        <div class="pointer-events-auto bg-slate-900/90 backdrop-blur border border-slate-800 p-2.5 rounded-2xl shadow-xl flex items-center gap-3">
            <button id="btn-musica" class="w-8 h-8 rounded-full bg-emerald-500 hover:bg-emerald-400 text-slate-950 flex items-center justify-center transition-colors">
                <svg id="icono-play" xmlns="http://www.w3.org/2000/svg" fill="currentColor" viewBox="0 0 24 24" class="w-4.5 h-4.5"><path d="M8 5v14l11-7z"/></svg>
                <svg id="icono-pause" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-4.5 h-4.5 hidden"><path stroke-linecap="round" stroke-linejoin="round" d="M15.75 5.25v13.5m-7.5-13.5v13.5" /></svg>
            </button>
            <audio id="audio-fondo" loop><source src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3" type="audio/mp3"></audio>
        </div>
    </div>

    <!-- CONTENIDO PRINCIPAL -->
    <main class="flex-grow flex flex-col items-center justify-center p-4 sm:p-6 md:p-8 max-w-2xl mx-auto w-full mt-16">
        <div class="text-center mb-8">
            <h1 id="main-title" class="text-4xl sm:text-5xl font-extrabold tracking-tight bg-clip-text text-transparent bg-gradient-to-r from-teal-400 to-emerald-400 mb-3">🩺 Botiquín Emocional</h1>
            <p id="main-subtitle" class="text-slate-400 text-sm sm:text-base max-w-md mx-auto leading-relaxed">Primeros auxilios espirituales para cuando sientes que todo se sale de control.</p>
        </div>

        <div class="grid grid-cols-2 gap-4 w-full mb-8">
            <button onclick="recetar('miedo')" id="btn-miedo" class="emocion-btn p-5 rounded-2xl border border-slate-800 bg-slate-900 hover:border-slate-700 hover:bg-slate-850 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg">
                <div class="flex justify-between items-start w-full">
                    <span id="label-miedo-tag" class="text-xs font-semibold tracking-wide uppercase text-slate-300 flex items-center gap-1.5"><span>🌀</span> Ansiedad</span>
                    <span class="text-blue-400"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m0-10.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.75c0 5.592 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.57-.598-3.75h-.152c-3.196 0-6.1-1.249-8.25-3.286Zm0 13.036h.008v.008H12v-.008Z" /></svg></span>
                </div>
                <div><h3 id="label-miedo-title" class="font-bold text-lg leading-snug">Miedo / Ansiedad</h3><p id="label-miedo-desc" class="text-xs mt-1 text-slate-400 leading-normal">¡Auxilio, mi cabeza no se calla!</p></div>
            </button>
            <button onclick="recetar('tristeza')" id="btn-tristeza" class="emocion-btn p-5 rounded-2xl border border-slate-800 bg-slate-900 hover:border-slate-700 hover:bg-slate-850 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg">
                <div class="flex justify-between items-start w-full">
                    <span id="label-tristeza-tag" class="text-xs font-semibold tracking-wide uppercase text-slate-300 flex items-center gap-1.5"><span>😢</span> Tristeza</span>
                    <span class="text-sky-400"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12Z" /></svg></span>
                </div>
                <div><h3 id="label-tristeza-title" class="font-bold text-lg leading-snug">Tristeza</h3><p id="label-tristeza-desc" class="text-xs mt-1 text-slate-400 leading-normal">Traigan pañuelos y helado...</p></div>
            </button>
            <button onclick="recetar('ira')" id="btn-ira" class="emocion-btn p-5 rounded-2xl border border-slate-800 bg-slate-900 hover:border-slate-700 hover:bg-slate-850 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg">
                <div class="flex justify-between items-start w-full">
                    <span id="label-ira-tag" class="text-xs font-semibold tracking-wide uppercase text-slate-300 flex items-center gap-1.5"><span>🤬</span> Ira</span>
                    <span class="text-red-400"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M15.362 5.214A8.252 8.252 0 0 1 12 21 8.25 8.25 0 0 1 6.038 7.047 8.287 8.287 0 0 0 9 9.601a8.983 8.983 0 0 1 3.361-6.867 8.21 8.21 0 0 0 3 2.48Z" /></svg></span>
                </div>
                <div><h3 id="label-ira-title" class="font-bold text-lg leading-snug">Ira / Enojo</h3><p id="label-ira-desc" class="text-xs mt-1 text-slate-400 leading-normal">¡Voy a romper algo!</p></div>
            </button>
            <button onclick="recetar('culpa')" id="btn-culpa" class="emocion-btn p-5 rounded-2xl border border-slate-800 bg-slate-900 hover:border-slate-700 hover:bg-slate-850 text-left transition-all duration-300 transform active:scale-95 flex flex-col justify-between h-40 shadow-lg">
                <div class="flex justify-between items-start w-full">
                    <span id="label-culpa-tag" class="text-xs font-semibold tracking-wide uppercase text-slate-300 flex items-center gap-1.5"><span>🫣</span> Culpa</span>
                    <span class="text-purple-400"><svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="w-6 h-6"><path stroke-linecap="round" stroke-linejoin="round" d="M9.813 15.904L9 21l5.435-2.21a11.96 11.96 0 005.15-5.15l2.21-5.435L15.9 9.813M9.813 15.904L4.378 18.115l-2.21-5.435a11.96 11.96 0 015.15-5.15l5.435-2.21m-2.94 10.584a3 3 0 11-4.244-4.244 3 3 0 014.244 4.244z" /></svg></span>
                </div>
                <div><h3 id="label-culpa-title" class="font-bold text-lg leading-snug">Vergüenza / Culpa</h3><p id="label-culpa-desc" class="text-xs mt-1 text-slate-400 leading-normal">Tierra, trágame...</p></div>
            </button>
        </div>

        <div class="w-full min-h-[280px]" id="pantalla-receta">
            <div class="border border-dashed border-slate-800 rounded-3xl p-8 text-center text-slate-500 flex flex-col items-center justify-center h-64 bg-slate-900/20">
                <span class="text-4xl mb-3 animate-bounce">👇</span>
                <p id="placeholder-text" class="text-base font-medium text-slate-300">¿Cómo te sientes en este momento?</p>
                <p id="placeholder-sub" class="text-xs text-slate-500 mt-1">Presiona un botón para recibir tu prescripción espiritual.</p>
            </div>
        </div>
    </main>

    <footer class="py-6 text-center text-xs text-slate-600">
        Hecho con ❤️ para momentos difíciles • Botiquín Emocional © 2026
    </footer>

    <script>
        // --- 1. LÓGICA DE DETECCIÓN DE PAGO EXITOSO ---
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('pago_exitoso') === 'true') {
            localStorage.setItem('botiquin_premium', 'true');
            // Limpia la URL
            window.history.replaceState({}, document.title, window.location.pathname);
            // Recarga sin el parámetro para limpieza visual
            window.location.href = window.location.pathname; 
        }

        // --- 2. CONFIGURACIÓN ---
        const ENLACE_STRIPE = "https://buy.stripe.com/5kQdRad2dgSe2nMcHA7Vm0d";
        const LIMITE_CONSULTAS_GRATIS = 3;
        let idiomaDestino = "es"; 
        let esPremium = localStorage.getItem('botiquin_premium') === 'true';
        
        if (localStorage.getItem('contador_consultas') === null) {
            localStorage.setItem('contador_consultas', '0');
        }
        let contadorConsultas = parseInt(localStorage.getItem('contador_consultas'));

    </script>
</body>
</html>
