<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Botiquin Emocional</title>
<script src="https://cdn.tailwindcss.com"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700&family=Playfair+Display:ital@1&display=swap" rel="stylesheet">
<style>
:root{--bg:#FFFCF7;--bg-card:#FFFCF7;--bg-card-soft:#F3E9DD;--border:#D8CFC3;--text:#5A544C;--text-soft:rgba(90,84,76,0.6);--text-strong:#0E0E0E;--accent:#4A7F6A}
[data-theme="dark"]{--bg:#0E0E0E;--bg-card:#161413;--bg-card-soft:#1C1A18;--border:rgba(90,84,76,0.3);--text:#F3E9DD;--text-soft:rgba(216,207,195,0.6);--text-strong:#FFFCF7;--accent:#D4B46A}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg)!important;color:var(--text)}
.font-serif{font-family:'Playfair Display',serif}
.carousel{display:flex;gap:14px;overflow-x:auto;padding:10px 20px 18px;scroll-snap-type:x mandatory}
.carousel::-webkit-scrollbar{display:none}
.carousel-item{scroll-snap-align:center;flex:0 0 76%;max-width:300px;min-width:168px}
.dot{width:6px;height:6px;border-radius:20px;background:var(--border)}
.dot.active{width:22px;background:var(--accent)}
.illustration{max-width:240px;margin:0 auto 16px}
</style>
</head>
<body class="min-h-screen flex flex-col">
<div class="fixed top-4 left-4 right-4 z-50 flex justify-between">
<div class="bg-[var(--bg-card)]/90 p-2 rounded-2xl border flex gap-2">🌐 <select id="idioma" onchange="cambiarIdioma(this.value)" class="bg-transparent text-xs font-bold"><option value="es">Español</option><option value="en">English</option><option value="pt">Português</option></select></div>
<div class="flex gap-2"><button onclick="toggleTheme()" class="bg-[var(--bg-card)]/90 p-2.5 rounded-2xl border w-10 h-10">🌗</button><div class="bg-[var(--bg-card)]/90 p-2.5 rounded-2xl border flex gap-2"><span id="contador" class="text-xs font-bold"></span><button id="btn-musica" class="w-8 h-8 rounded-full bg-[var(--accent)] text-white">▶</button><audio id="audio" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio></div></div>
</div>
<main class="p-4 max-w-2xl mx-auto w-full mt-20 flex flex-col items-center">
<h1 class="text-4xl font-extrabold mb-2" style="color:var(--accent)">🩺 Botiquín Emocional</h1>
<p class="text-sm opacity-60 mb-6 text-center">Primeros auxilios espirituales</p>
<div id="emociones" class="carousel w-full">
<button onclick="recetar('miedo')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🌀 ANSIEDAD<br><b>Miedo</b><br><span class="text-xs opacity-60">¡Auxilio, mi cabeza no se calla!</span></button>
<button onclick="recetar('tristeza')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">😢 TRISTEZA<br><b>Tristeza</b></button>
<button onclick="recetar('ira')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🤬 IRA<br><b>Ira</b></button>
<button onclick="recetar('culpa')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🫣 CULPA<br><b>Culpa</b></button>
<button onclick="recetar('soledad')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🌙 SOLEDAD<br><b>Soledad</b></button>
<button onclick="recetar('agotamiento')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🪫 CANSANCIO<br><b>Agotamiento</b></button>
<button onclick="recetar('confusion')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🌫️ CONFUSIÓN<br><b>Confusión</b></button>
<button onclick="recetar('desanimo')" class="carousel-item p-5 rounded-2xl border bg-[var(--bg-card)] text-left h-40">🍂 DESÁNIMO<br><b>Desánimo</b></button>
</div>
<div id="pantalla" class="w-full min-h-[300px] mt-4"></div>
</main>
<script>
const html=document.documentElement;html.setAttribute('data-theme',localStorage.getItem('theme')||'dark');
function toggleTheme(){const n=html.getAttribute('data-theme')==='dark'?'light':'dark';html.setAttribute('data-theme',n);localStorage.setItem('theme',n)}
let cont=parseInt(localStorage.getItem('contador')||'0');function upd(){document.getElementById('contador').innerText=cont+' GRATIS'}upd();
const DB={miedo:[{v:"No se preocupen por nada; oren por todo.",c:"Filipenses 4:6",com:"Deja el micrófono y respira."},{v:"En el día que temo, yo en ti confío.",c:"Salmo 56:3",com:"Sentir miedo es humano."}],tristeza:[{v:"Cercano está el Señor a los quebrantados.",c:"Salmo 34:18",com:"Dios se sienta contigo en el suelo."}],ira:[{v:"Si se enojan, no pequen.",c:"Efesios 4:26",com:"No envíes ese mensaje."}],culpa:[{v:"Ninguna condenación hay en Cristo.",c:"Romanos 8:1",com:"Caso cerrado."}],soledad:[{v:"Yo estoy con vosotros todos los días.",c:"Mateo 28:20",com:"Todos los días, incluso hoy."}],agotamiento:[{v:"Vengan a mí los cansados.",c:"Mateo 11:28",com:"Él no cobra por hora."}],confusion:[{v:"Pide sabiduría a Dios.",c:"Santiago 1:5",com:"Reduce a 2 opciones y ora."}],desanimo:[{v:"Esforzaos y cobrad ánimo.",c:"Deuteronomio 31:6",com:"Vas con Uno que no falla."}]};
let actual=null,idx=0;
function mostrar(){document.getElementById('pantalla').innerHTML=`<div class="p-8 rounded-3xl border bg-[var(--bg-card)] text-center"><img src="hero-bienvenida.webp" class="illustration" onerror="this.style.display='none'"><p class="font-serif italic text-xl">"Lámpara es a mis pies tu palabra"</p><p class="text-sm font-bold mt-2" style="color:var(--accent)">Salmo 119:105</p><p class="text-sm mt-4 font-semibold">Respira. Estás a salvo. Escoge lo que sientes y recibe paz.</p></div>`}
function recetar(k){cont++;localStorage.setItem('contador',cont);upd();actual=k;idx=Math.floor(Math.random()*DB[k].length);render()}
function render(){const it=DB[actual][idx];document.getElementById('pantalla').innerHTML=`<div class="p-8 rounded-3xl border bg-[var(--bg-card)]"><p class="font-serif italic text-xl">"${it.v}"</p><p class="text-right text-xs font-bold mt-2">${it.c}</p><div class="bg-[var(--bg-card-soft)] p-4 rounded-xl mt-4"><p class="text-sm font-semibold">${it.com}</p></div><button onclick="idx=(idx+1)%DB[actual].length;render()" class="mt-4 w-full py-3 rounded-xl bg-[var(--accent)] text-white font-bold">Otra 🔄</button></div>`}
function cambiarIdioma(){}
document.getElementById('btn-musica').onclick=()=>{const a=document.getElementById('audio');a.paused?a.play():a.pause()};
mostrar();
</script>
</body>
</html>
